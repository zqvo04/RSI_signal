name: RSI Telegram Signal Bot

on:
  schedule:
    # GitHub Actions cron uses UTC: run one minute after each 15-minute close.
    - cron: '1,16,31,46 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-rsi-signals:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check RSI reversal signals
        env:
          OKX_API_KEY: ${{ secrets.OKX_API_KEY }}
          OKX_SECRET: ${{ secrets.OKX_SECRET }}
          OKX_PASSWORD: ${{ secrets.OKX_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

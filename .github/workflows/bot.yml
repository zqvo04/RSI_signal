name: RSI Telegram Signal Bot

on:
  # Triggered by console.cron-job.org through GitHub's repository dispatch API.
  repository_dispatch:
    types: [rsi-signal-check]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-rsi-signals:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check RSI reversal signals
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
